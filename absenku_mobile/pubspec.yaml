name: absenku_mobile
description: "Absenku Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  device_preview: any
  file_picker: ^8.0.0
  url_launcher: ^6.2.6
  geolocator: ^13.0.1
  path_provider: ^2.1.2
  open_file: ^3.3.2
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_transparent.webp"
  min_sdk_size: 21
  adaptive_icon_background: "#1E4D8C"
  adaptive_icon_foreground: "assets/images/logo_transparent.webp"
  web:
    generate: true
    image_path: "assets/images/logo_transparent.webp"
    background_color: "#1E4D8C"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
